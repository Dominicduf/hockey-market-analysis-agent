<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hockey Market Analysis Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 48px 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 36px;
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 1.4rem;
      color: #2c3e50;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #7f8c8d;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.2s;
      color: #2c3e50;
    }

    textarea:focus { border-color: #3498db; }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #34495e; }
    button:disabled { background: #95a5a6; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      display: none;
    }

    .result-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #7f8c8d;
      margin-bottom: 8px;
    }

    .result-text {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.9rem;
      color: #2c3e50;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .download-banner {
      margin-top: 16px;
      padding: 14px 18px;
      background: #eafaf1;
      border: 1.5px solid #27ae60;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      display: none;
    }

    .download-banner span {
      font-size: 0.9rem;
      color: #1e8449;
      font-weight: 500;
    }

    .download-btn {
      margin-top: 0;
      width: auto;
      padding: 8px 18px;
      background: #27ae60;
      font-size: 0.85rem;
    }

    .download-btn:hover { background: #219a52; }

    .spinner {
      display: none;
      text-align: center;
      padding: 20px 0;
      color: #7f8c8d;
      font-size: 0.9rem;
    }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fdf0ef;
      border: 1.5px solid #e74c3c;
      border-radius: 8px;
      color: #c0392b;
      font-size: 0.9rem;
      display: none;
    }

    .message {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fef9e7;
      border: 1.5px solid #f39c12;
      border-radius: 8px;
      color: #7d6608;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hockey Market Analysis Agent</h1>
    <p class="subtitle">Ask for a market analysis on any hockey equipment category.</p>

    <textarea id="query" placeholder="e.g. Produce a market analysis for hockey sticks and skates."></textarea>
    <button id="submitBtn" onclick="runAnalysis()">Run Analysis</button>

    <div class="spinner" id="spinner">⏳ Analyzing... this may take a minute.</div>
    <div class="error" id="error"></div>
    <div class="message" id="message"></div>

    <div class="download-banner" id="downloadBanner">
      <span>📄 Report ready</span>
      <button class="download-btn" id="downloadBtn">Download PDF</button>
    </div>


  </div>

  <script>
    async function runAnalysis() {
      const query = document.getElementById("query").value.trim();
      if (!query) return;

      const btn = document.getElementById("submitBtn");
      const spinner = document.getElementById("spinner");
      const error = document.getElementById("error");
      const downloadBanner = document.getElementById("downloadBanner");
      const downloadBtn = document.getElementById("downloadBtn");
      const message = document.getElementById("message");

      btn.disabled = true;
      spinner.style.display = "block";
      error.style.display = "none";
      message.style.display = "none";
      downloadBanner.style.display = "none";

      try {
        const res = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "Something went wrong.");
        }

        // Extract report filename and trigger download
        const match = data.response.match(/report_\d{8}_\d{6}\.pdf/);
        if (match) {
          const filename = match[0];
          downloadBtn.onclick = () => window.location.href = `/reports/${filename}`;
          downloadBanner.style.display = "flex";
        } else {
          message.textContent = data.response;
          message.style.display = "block";
        }

      } catch (err) {
        error.textContent = err.message;
        error.style.display = "block";
      } finally {
        btn.disabled = false;
        spinner.style.display = "none";
      }
    }

    document.getElementById("query").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && e.ctrlKey) runAnalysis();
    });
  </script>
</body>
</html>
